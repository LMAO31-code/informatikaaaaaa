<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Wallet - Expense Tracker</title>
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>

    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="page-title">
            <i class="fas fa-wallet"></i> Digital wallet
        </h1>
        
        <div class="main-grid">

            <div class="form-card">
                <h2 class="section-title">Add New Transaction</h2>
                <form id="expenseForm">
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="transactionType" value="expense" checked>
                            <span>Expense</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="transactionType" value="income">
                            <span>Income</span>
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select a category</option>
                            <option value="other">other</option>
                            <option value="food">Food & Beverages</option>
                            <option value="health">Health</option>
                            <option value="education">Education</option>
                            <option value="travel">Travel</option>
                            <option value="shopping">Shopping</option>
                            <option value="living">Living Expenses</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description">
                    </div>
                    
                    <button type="submit" class="btn-submit">
                        Add Transaction
                    </button>
                </form>
            </div>

            <div class="content-card">

                <div>
                    <h2 class="section-title">Transaction Summary</h2>
                    <div class="summary-grid">
                        <div class="summary-card">
                            <p class="summary-label">Total Balance</p>
                            <p id="totalBalance" class="balance-value">$0.00</p>
                        </div>
                        <div class="summary-card">
                            <p class="summary-label">Income</p>
                            <p id="totalIncome" class="income-value">$0.00</p>
                        </div>
                        <div class="summary-card">
                            <p class="summary-label">Expenses</p>
                            <p id="totalExpenses" class="expense-value">$0.00</p>
                        </div>
                    </div>
                    

                    <div class="chart-container">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>

                <div>
                    <h2 class="section-title">
                        <i class="uil uil-history"></i> Transaction History
                    </h2>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th><i class="uil uil-calendar-alt"></i> Date</th>
                                    <th><i class="uil uil-window"></i> Category</th>
                                    <th><i class="uil uil-align-left"></i> Description</th>
                                    <th><i class="uil uil-money-bill"></i> Amount</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="expenseHistory">

                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
